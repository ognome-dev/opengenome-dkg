[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:mysql]
command=/usr/bin/mysqld_safe --user=mysql
autostart=true
autorestart=true
stderr_logfile=/dev/fd/1
stderr_logfile_maxbytes=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
priority=10

[program:redis]
command=/usr/bin/redis-server
autostart=true
autorestart=true
stderr_logfile=/dev/fd/1
stderr_logfile_maxbytes=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
priority=20

[program:fuseki]
command=java -Xmx512m -Xms128m -jar /opt/fuseki/fuseki-server.jar --port=3030 --mem /operationaldb
autostart=true
autorestart=true
stderr_logfile=/dev/fd/1
stderr_logfile_maxbytes=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
priority=30
environment=FUSEKI_HOME="/opt/fuseki",FUSEKI_BASE="/opt/fuseki/run"

[program:otnode]
command=/opt/ot-node/start-node.sh
autostart=true
autorestart=true
startsecs=5
startretries=10
stderr_logfile=/dev/fd/1
stderr_logfile_maxbytes=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
priority=40
